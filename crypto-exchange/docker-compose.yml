version: '3.8'

networks:
  crypto-net:
    driver: bridge

volumes:
  hdfs-namenode:
  hdfs-datanode:
  prometheus-data:
  grafana-data:

services:

  # ── ZOOKEEPER ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks: [crypto-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── KAFKA ──
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks: [crypto-net]
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ── KAFKA UI ──
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [crypto-net]
    depends_on: [kafka]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── HDFS NAMENODE ──
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    networks: [crypto-net]
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hdfs-namenode:/hadoop/dfs/name
    environment:
      CLUSTER_NAME: crypto-cluster
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: "1"
      HDFS_CONF_dfs_namenode_datanode__registration_ip___hostname__check: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── HDFS DATANODE ──
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    networks: [crypto-net]
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hdfs-datanode:/hadoop/dfs/data
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: "1"

  # ── PRODUCTOR BINANCE ──
  producer:
    build: ./producer
    container_name: producer
    networks: [crypto-net]
    depends_on: [kafka]
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── SPARK MASTER ──
  spark-master:
    build: ./spark
    container_name: spark-master
    networks: [crypto-net]
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080"
      - "7077:7077"

  # ── SPARK WORKER ──
  spark-worker:
    build: ./spark
    container_name: spark-worker
    networks: [crypto-net]
    depends_on: [spark-master]
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  # ── SPARK JOB ──
  spark-job:
    build: ./spark
    container_name: spark-job
    networks: [crypto-net]
    depends_on: [spark-master, kafka, namenode]
    volumes:
      - ./spark:/app
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      /app/streaming_job.py
    restart: unless-stopped

  # ── NODE EXPORTER (CPU, RAM, disco del host) ──
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks: [crypto-net]
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  # ── CADVISOR (recursos por contenedor) ──
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    networks: [crypto-net]
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true

  # ── PROMETHEUS ──
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks: [crypto-net]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # ── GRAFANA ──
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks: [crypto-net]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on: [prometheus]
# ── COINGECKO PRODUCER ──
  coingecko:
    build: ./coingecko
    container_name: coingecko
    networks: [crypto-net]
    depends_on: [kafka]
    ports:
      - "8001:8001"
    restart: unless-stopped

# ── FEAR & GREED INDEX ──
  feargreed:
    build: ./feargreed
    container_name: feargreed
    networks: [crypto-net]
    depends_on: [kafka]
    ports:
      - "8002:8002"
    restart: unless-stopped

# ── HIVE ──
  hive:
    image: apache/hive:3.1.3
    container_name: hive
    networks: [crypto-net]
    depends_on: [namenode, datanode]
    environment:
      SERVICE_NAME: hiveserver2
      HIVE_CUSTOM_CONF_DIR: /hive-config
      IS_RESUME: "true"
    ports:
      - "10000:10000"
      - "10002:10002"
