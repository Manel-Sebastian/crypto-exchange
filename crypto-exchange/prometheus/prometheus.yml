global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:

  # ── Prometheus itself ──
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Productor Python (métricas de negocio) ──
  - job_name: 'crypto-producer'
    static_configs:
      - targets: ['producer:8000']
    metrics_path: '/metrics'

  # ── Node Exporter (CPU, RAM, disco del host) ──
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ── cAdvisor (recursos por contenedor Docker) ──
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
# ── CoinGecko Producer (métricas) ──
  - job_name: 'coingecko-producer'
    static_configs:
      - targets: ['coingecko:8001']
    metrics_path: '/metrics'

# ── Fear & Greed Producer ──
  - job_name: 'feargreed-producer'
    static_configs:
      - targets: ['feargreed:8002']
    metrics_path: '/metrics'
